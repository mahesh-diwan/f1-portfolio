<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060608"/>
      <stop offset="50%" style="stop-color:#0c0c12"/>
      <stop offset="100%" style="stop-color:#12121a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#dc0000"/>
      <stop offset="50%" style="stop-color:#1e3a8a"/>
      <stop offset="100%" style="stop-color:#00d2be"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- F1 team color bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>
  <!-- Red glow -->
  <circle cx="200" cy="300" r="200" fill="#dc0000" opacity="0.06"/>
  <!-- Blue glow -->
  <circle cx="1000" cy="200" r="180" fill="#1e3a8a" opacity="0.08"/>
  <!-- Teal glow -->
  <circle cx="600" cy="500" r="250" fill="#00d2be" opacity="0.04"/>
  <!-- Text -->
  <text x="600" y="260" font-family="system-ui, sans-serif" font-size="72" font-weight="800" fill="#f5f5f7" text-anchor="middle" letter-spacing="-2">MAHESH DIWAN</text>
  <text x="600" y="320" font-family="monospace" font-size="24" fill="#dc0000" text-anchor="middle" letter-spacing="8">DEVOPS &amp; CLOUD ENGINEER</text>
  <text x="600" y="380" font-family="monospace" font-size="16" fill="#8a8a9a" text-anchor="middle" letter-spacing="2">AWS · Kubernetes · Terraform · CI/CD</text>
  <!-- Bottom bar -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent)"/>
</svg>
