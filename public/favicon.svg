<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc0000"/>
      <stop offset="100%" style="stop-color:#941a16"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>
  <g transform="translate(6, 5)">
    <!-- Checkered flag pattern -->
    <rect x="0" y="0" width="4" height="4" fill="white"/>
    <rect x="4" y="0" width="4" height="4" fill="#1e1005"/>
    <rect x="8" y="0" width="4" height="4" fill="white"/>
    <rect x="12" y="0" width="4" height="4" fill="#1e1005"/>
    <rect x="0" y="4" width="4" height="4" fill="#1e1005"/>
    <rect x="4" y="4" width="4" height="4" fill="white"/>
    <rect x="8" y="4" width="4" height="4" fill="#1e1005"/>
    <rect x="12" y="4" width="4" height="4" fill="white"/>
    <rect x="0" y="8" width="4" height="4" fill="white"/>
    <rect x="4" y="8" width="4" height="4" fill="#1e1005"/>
    <rect x="8" y="8" width="4" height="4" fill="white"/>
    <rect x="12" y="8" width="4" height="4" fill="#1e1005"/>
    <rect x="0" y="12" width="4" height="4" fill="#1e1005"/>
    <rect x="4" y="12" width="4" height="4" fill="white"/>
    <rect x="8" y="12" width="4" height="4" fill="#1e1005"/>
    <rect x="12" y="12" width="4" height="4" fill="white"/>
    <!-- Flag pole -->
    <rect x="16" y="2" width="2" height="16" rx="1" fill="#c0c0c0"/>
    <circle cx="17" cy="2" r="1.5" fill="#ffd700"/>
  </g>
</svg>
