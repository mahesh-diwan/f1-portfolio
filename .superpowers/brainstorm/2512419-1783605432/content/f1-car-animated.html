<h2>F1 Car — Animated Across</h2>
<p class="subtitle">Real image driving across between sections</p>

<div class="mockup">
  <div class="mockup-header">F1 Car — Drives Across on Load</div>
  <div class="mockup-body" style="padding:0;overflow:hidden;background:#0a0e14;">
    <div style="padding:30px 24px;text-align:center;">
      <p style="color:#888;font-size:12px;letter-spacing:0.15em;font-family:monospace;">SCROLL TO EXPLORE</p>
    </div>
    
    <!-- Animated divider -->
    <div style="position:relative;height:140px;overflow:hidden;background:linear-gradient(180deg,#0d1117,#111827,#0d1117);">
      <!-- Track line -->
      <div style="position:absolute;top:50%;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(196,164,74,0.3),transparent);"></div>
      
      <!-- The actual F1 car image - animating across -->
      <img 
        src="/images/f1-car-divider.jpg" 
        alt="F1 car" 
        style="
          position:absolute;
          top:50%;
          transform:translateY(-50%);
          height:100px;
          width:auto;
          object-fit:contain;
          filter:drop-shadow(0 4px 20px rgba(30,41,82,0.5));
          animation: driveAcross 3s ease-in-out forwards;
        "
      >
      
      <!-- Speed lines behind car -->
      <div style="position:absolute;top:50%;transform:translateY(-50%);left:0;right:0;pointer-events:none;">
        <div style="position:absolute;left:10%;width:80px;height:2px;background:linear-gradient(90deg,transparent,#ff3333,transparent);opacity:0.4;animation:speedFade 3s ease-in-out;"></div>
        <div style="position:absolute;left:15%;width:60px;height:1px;background:linear-gradient(90deg,transparent,#ff3333,transparent);opacity:0.3;top:-10px;animation:speedFade 3s ease-in-out 0.2s;"></div>
        <div style="position:absolute;left:12%;width:70px;height:1px;background:linear-gradient(90deg,transparent,#ff3333,transparent);opacity:0.3;top:10px;animation:speedFade 3s ease-in-out 0.1s;"></div>
      </div>
    </div>
    
    <!-- Gold line -->
    <div style="height:1px;background:linear-gradient(90deg,transparent,rgba(196,164,74,0.4),transparent);"></div>
    
    <div style="padding:40px 24px;">
      <div style="display:flex;align-items:center;gap:12px;">
        <div style="width:3px;height:24px;background:linear-gradient(to bottom,#c4a44a,#c4a44a);"></div>
        <div>
          <p style="color:#888;font-size:12px;letter-spacing:0.15em;font-family:monospace;">CAREER TELEMETRY</p>
          <h2 style="color:#f5f5f5;font-size:32px;font-weight:700;font-family:'Sora',sans-serif;">Experience</h2>
        </div>
      </div>
    </div>
  </div>
</div>

<style>
  @keyframes driveAcross {
    0% { left: -300px; }
    100% { left: calc(100% + 300px); }
  }
  @keyframes speedFade {
    0% { opacity: 0; }
    30% { opacity: 0.4; }
    100% { opacity: 0; }
  }
</style>
