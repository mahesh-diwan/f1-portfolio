name: Fetch F1 Standings
on:
  schedule:
    - cron: '0 12 * * 1'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: node scripts/fetch-standings.mjs
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update f1 standings"
          file_pattern: src/data/standings.json
